<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#FF85A1"/>
  <!-- Bow left loop -->
  <ellipse cx="32" cy="28" rx="16" ry="10" fill="#FF0066" transform="rotate(-30 32 28)"/>
  <!-- Bow right loop -->
  <ellipse cx="68" cy="28" rx="16" ry="10" fill="#FF0066" transform="rotate(30 68 28)"/>
  <!-- Bow center knot -->
  <circle cx="50" cy="30" r="7" fill="#FF5B7F"/>
  <!-- X mark (Hello Kitty style face mark) -->
  <line x1="33" y1="58" x2="45" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="45" y1="58" x2="33" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="55" y1="58" x2="67" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="67" y1="58" x2="55" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
</svg>
